<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="150" y1="0" x2="150" y2="400"/><line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="750" y1="0" x2="750" y2="400"/><line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1050" y1="0" x2="1050" y2="400"/>
  </g>
  <!-- Glow circles -->
  <circle cx="900" cy="150" r="200" fill="rgba(124,58,237,0.08)"/>
  <circle cx="200" cy="300" r="150" fill="rgba(245,166,35,0.06)"/>
  <!-- Accent bar -->
  <rect x="0" y="395" width="1200" height="5" fill="url(#accent)"/>
  <!-- Logo text -->
  <text x="600" y="170" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="72" font-weight="900" fill="#f5a623" filter="url(#glow)" letter-spacing="8">⚔️ KABUTO</text>
  <text x="600" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" fill="#f1f5f9" letter-spacing="4">ESPORTS</text>
  <text x="600" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#64748b" letter-spacing="6">TOURNAMENT REGISTRATION PLATFORM</text>
  <!-- Decorative diamonds -->
  <polygon points="60,200 80,175 100,200 80,225" fill="rgba(245,166,35,0.3)" stroke="#f5a623" stroke-width="1"/>
  <polygon points="1100,200 1120,175 1140,200 1120,225" fill="rgba(124,58,237,0.3)" stroke="#7c3aed" stroke-width="1"/>
</svg>
